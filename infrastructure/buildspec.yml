              .replace(/{{SKILL_ORCHESTRATOR_LAMBDA_ARN}}/g, `arn:aws:lambda:${cdk.Aws.REGION}:${cdk.Aws.ACCOUNT_ID}:function:app-modex-skill-importance-orchestrator-${props.projectId}`)
              .replace(/{{SKILL_SCORER_LAMBDA_ARN}}/g, `arn:aws:lambda:${cdk.Aws.REGION}:${cdk.Aws.ACCOUNT_ID}:function:app-modex-skill-importance-scorer-${props.projectId}`);
            
            skillImportanceStepFunctionDefinition = JSON.parse(skillImportanceStepFunctionDefinitionString);
            */

            // Replace CDK template variables with actual values
            let skillImportanceStepFunctionDefinitionString = JSON.stringify(skillImportanceStepFunctionDefinition)
              .replace(/\$\{cdk\.Aws\.REGION\}/g, cdk.Aws.REGION)
              .replace(/\$\{cdk\.Aws\.ACCOUNT_ID\}/g, cdk.Aws.ACCOUNT_ID)
              .replace(/\$\{props\.projectId\}/g, props.projectId);

            skillImportanceStepFunctionDefinition = JSON.parse(skillImportanceStepFunctionDefinitionString);


            // Create CloudWatch Log Group for Skill Importance Step Function
            const skillImportanceLogGroup = new logs.LogGroup(this, 'SkillImportanceLogGroup', {
              logGroupName: `/aws/vendedlogs/states/app-modex-skill-importance-${props.projectId}`.toLowerCase(),
              retention: logs.RetentionDays.ONE_WEEK,
              removalPolicy: cdk.RemovalPolicy.DESTROY
            });

            // CloudWatch Logs permissions already granted in skillImportanceStepFunctionRole inline policy with wildcard resources

            // Create Skill Importance Step Function (using shared CloudWatch Logs resource policy from backend stack)
            const skillImportanceStateMachine = new cdk.CfnResource(this, 'SkillImportanceStateMachine', {
              type: 'AWS::StepFunctions::StateMachine',
              properties: {
                StateMachineName: `app-modex-skill-importance-${props.projectId}`.toLowerCase(),
                RoleArn: skillImportanceStepFunctionRole.roleArn,
                DefinitionString: JSON.stringify(skillImportanceStepFunctionDefinition),
                StateMachineType: 'STANDARD',
                TracingConfiguration: {
                  Enabled: true
                },
                LoggingConfiguration: {
                  Level: 'ERROR',
                  IncludeExecutionData: false,
                  Destinations: [
                    {
                      CloudWatchLogsLogGroup: {
                        LogGroupArn: skillImportanceLogGroup.logGroupArn
                      }
                    }
                  ]
                }
              }
            });
            
            skillImportanceStateMachine.node.addDependency(skillImportanceLogGroup);

            // Grant permissions for project Lambda role to start skill importance executions
            projectLambdaRole.addToPolicy(new iam.PolicyStatement({
              actions: ['states:StartExecution'],
              resources: [skillImportanceStateMachine.getAtt('Arn').toString()]
            }));

            // Output Skill Importance Step Function ARN
            new cdk.CfnOutput(this, 'SkillImportanceStateMachineArn', {
              value: skillImportanceStateMachine.getAtt('Arn').toString(),
              description: 'ARN of the Skill Importance Scoring Step Function',
              exportName: `App-ModEx-SkillImportanceStateMachine-${props.projectId}`
            });
          }
        }
        EOFSTACK
      
      # Lambda functions now use external files with fromAsset() - no mkdir needed
