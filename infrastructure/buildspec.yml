      - cd ..

  pre_build:
    commands:
      - echo Preparing for CDK deployment...
      - export PROJECT_STACK_NAME="App-ModEx-Project-${PROJECT_ID}"
      - echo "Deploying stack with PROJECT_STACK_NAME variable"
      - echo "Environment variables:"
      - echo "PROJECT_ID set"
      - echo "ENVIRONMENT set"
      - echo "ACTION set"
      - echo "IDENTITY_POOL_ID set"
      - echo "[INFO] SQS Architecture - Data processing handled by master backend"
      
      # SECURITY NOTE: Bucket ownership verification (Remediation #24)
      # Verify S3 bucket ownership and region before deployment
      - |
        echo "=== Verifying S3 Bucket Region ==="
        # Extract account ID from STS since AWS_ACCOUNT_ID may not be set in CodeBuild
        ACCOUNT_ID=$(aws sts get-caller-identity --query 'Account' --output text)
        DEPLOYMENT_BUCKET_NAME="app-modex-deployment-${ACCOUNT_ID}-${AWS_REGION}"
        echo "Checking bucket: $DEPLOYMENT_BUCKET_NAME"
        
        # Verify bucket region
        BUCKET_REGION=$(aws s3api get-bucket-location --bucket $DEPLOYMENT_BUCKET_NAME --query 'LocationConstraint' --output text 2>/dev/null)
        if [ $? -ne 0 ]; then
          echo "ERROR: Failed to retrieve bucket location. Bucket may not exist or access denied."
          exit 1
        fi
        
        if [ "$BUCKET_REGION" = "None" ]; then
          BUCKET_REGION="us-east-1"
        fi
        echo "✓ Bucket region verified: $BUCKET_REGION"
        
        # Verify bucket is in expected region
        if [ "$BUCKET_REGION" != "$AWS_REGION" ]; then
          echo "WARNING: Bucket region ($BUCKET_REGION) does not match deployment region ($AWS_REGION)"
          echo "  This may cause deployment issues."
        fi
        echo "=== Bucket Verification Complete ==="

  build:
    commands:
      - echo Build started on `date`
      - cd infrastructure
      - echo "Checking action type - ACTION=$ACTION"
      - echo "Starting conditional deployment logic..."
      - 'if [ "$ACTION" = "deploy" ]; then echo "[INFO] === DEPLOY ACTION ==="; fi'
      - 'if [ "$ACTION" = "deploy" ]; then echo "[INFO] Assuming CDK Deployment Role for elevated permissions..."; fi'
      - |
        if [ "$ACTION" = "deploy" ]; then
          ROLE_ARN="arn:aws:iam::594072238132:role/app-modex-cdk-deployment-role"
          CREDENTIALS=$(aws sts assume-role --role-arn $ROLE_ARN --role-session-name CodeBuildCDKDeployment --duration-seconds 3600 --query 'Credentials.[AccessKeyId,SecretAccessKey,SessionToken]' --output text)
          
          if [ $? -ne 0 ]; then
            echo "[ERROR] Failed to assume CDK Deployment Role"
            exit 1
          fi
          
          export AWS_ACCESS_KEY_ID=$(echo $CREDENTIALS | awk '{print $1}')
          export AWS_SECRET_ACCESS_KEY=$(echo $CREDENTIALS | awk '{print $2}')
          export AWS_SESSION_TOKEN=$(echo $CREDENTIALS | awk '{print $3}')
          
          echo "[SUCCESS] Assumed CDK Deployment Role with temporary credentials"
        fi
      - 'if [ "$ACTION" = "deploy" ]; then echo "[INFO] Compiling TypeScript..."; fi'
      - 'if [ "$ACTION" = "deploy" ]; then npm run build; fi'
      - 'if [ "$ACTION" = "deploy" ]; then echo "[INFO] Verifying Lambda assets are available..."; fi'
      - 'if [ "$ACTION" = "deploy" ]; then echo "Current directory: $(pwd)"; fi'
      - 'if [ "$ACTION" = "deploy" ]; then echo "Lambda directory contents:"; fi'
      - 'if [ "$ACTION" = "deploy" ]; then ls -la lambda/project-specific/ 2>&1 | head -30; fi'
      - 'if [ "$ACTION" = "deploy" ]; then echo "Checking for athena-s3-wrapper:"; fi'
      - 'if [ "$ACTION" = "deploy" ]; then test -d lambda/project-specific/athena-s3-wrapper && echo "FOUND" || echo "NOT FOUND"; fi'
      - 'if [ "$ACTION" = "deploy" ]; then echo "[INFO] Deploying CDK stack $PROJECT_STACK_NAME..."; fi'
      - 'if [ "$ACTION" = "deploy" ]; then cdk deploy $PROJECT_STACK_NAME --context environment="$ENVIRONMENT" --require-approval never; fi'
      - 'if [ "$ACTION" = "deploy" ]; then echo "[INFO] Associating project stack with App-ModEx application..."; fi'
      - 'if [ "$ACTION" = "deploy" ]; then echo "[INFO] Project stack deployed successfully - resources will be visible in Resource Groups via Application=App-ModEx tag"; fi'
      - 'if [ "$ACTION" = "destroy" ]; then echo "[INFO] === DESTROY ACTION ==="; fi'
      - 'if [ "$ACTION" = "destroy" ]; then echo "[INFO] Assuming CDK Destroy Role for stack deletion..."; fi'
      - 'if [ "$ACTION" = "destroy" ]; then DESTROY_ROLE_ARN="arn:aws:iam::594072238132:role/app-modex-cdk-destroy-role"; fi'
      - 'if [ "$ACTION" = "destroy" ]; then ASSUMED_ROLE=$(aws sts assume-role --role-arn $DESTROY_ROLE_ARN --role-session-name codebuild-destroy-session --duration-seconds 3600); fi'
      - 'if [ "$ACTION" = "destroy" ]; then export AWS_ACCESS_KEY_ID=$(echo $ASSUMED_ROLE | jq -r ".Credentials.AccessKeyId"); fi'
      - 'if [ "$ACTION" = "destroy" ]; then export AWS_SECRET_ACCESS_KEY=$(echo $ASSUMED_ROLE | jq -r ".Credentials.SecretAccessKey"); fi'
      - 'if [ "$ACTION" = "destroy" ]; then export AWS_SESSION_TOKEN=$(echo $ASSUMED_ROLE | jq -r ".Credentials.SessionToken"); fi'
      - 'if [ "$ACTION" = "destroy" ]; then echo "[INFO] Deleting CloudFormation stack $PROJECT_STACK_NAME..."; fi'
      - 'if [ "$ACTION" = "destroy" ]; then aws cloudformation delete-stack --stack-name $PROJECT_STACK_NAME; fi'
      - 'if [ "$ACTION" = "destroy" ]; then echo "[INFO] Waiting for stack deletion to complete..."; fi'
      - 'if [ "$ACTION" = "destroy" ]; then aws cloudformation wait stack-delete-complete --stack-name $PROJECT_STACK_NAME; fi'
      - 'if [ "$ACTION" = "destroy" ]; then echo "[SUCCESS] Stack $PROJECT_STACK_NAME deleted successfully"; fi'
      - 'if [ "$ACTION" != "deploy" ] && [ "$ACTION" != "destroy" ]; then echo "[ERROR] Unknown action $ACTION"; fi'
      - 'if [ "$ACTION" != "deploy" ] && [ "$ACTION" != "destroy" ]; then echo "[ERROR] Valid actions are: deploy, destroy"; fi'
      - 'if [ "$ACTION" != "deploy" ] && [ "$ACTION" != "destroy" ]; then exit 1; fi'

  post_build:
    commands:
      - echo Build completed on `date`
      - echo "Current directory:" && pwd
      - echo "Stack outputs:"
      - cdk list || echo "No stacks to list"
      # Ensure the results bucket exists
      - |
        if [ "$ACTION" = "deploy" ]; then
          echo "[INFO] Ensuring results bucket exists..."
          # Create the bucket if it doesn't exist (ignore error if it already exists)
          BUCKET_NAME=$(echo "app-modex-results-${PROJECT_ID}" | tr '[:upper:]' '[:lower:]')
          aws s3api create-bucket --bucket ${BUCKET_NAME} --region ${AWS_REGION} --create-bucket-configuration LocationConstraint=${AWS_REGION} || true
          
          # Disable block public access for the bucket (if needed for Athena)
          aws s3api put-public-access-block --bucket ${BUCKET_NAME} --public-access-block-configuration "BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true"
          
          echo "[SUCCESS] Results bucket setup complete."
        fi
      # Create project-specific deduplication views
      - 'if [ "$ACTION" = "deploy" ]; then chmod +x scripts/create-project-views.sh && ./scripts/create-project-views.sh; fi'
      - echo "[INFO] Project deployment complete"

artifacts:
  files:
    - infrastructure/cdk.out/**/*
  base-directory: '.'
