version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 22
    commands:
      - echo Installing dependencies...
      - echo "Current directory:" && pwd
      - echo "Available files:" && ls -la
      
      # DEBUG: Print all environment variables
      - echo "=== ENVIRONMENT VARIABLES DEBUG ==="
      - echo "PROJECT_ID=${PROJECT_ID}"
      - echo "STACK_NAME=${STACK_NAME}"
      - echo "ACTION=${ACTION}"
      - echo "ENVIRONMENT=${ENVIRONMENT}"
      - echo "DEPLOYMENT_BUCKET=${DEPLOYMENT_BUCKET}"
      - echo "IDENTITY_POOL_ID=${IDENTITY_POOL_ID}"
      - echo "=== ALL ENVIRONMENT VARIABLES ==="
      - env | sort
      - echo "=== END DEBUG ==="
      
      # Verify Node.js and npm are working
      - echo "Node.js version:" && node --version
      - echo "npm version:" && npm --version
      
      # FIRST STEP: Download and extract project-specific sources zip from S3 deployment bucket (skip for destroy)
      - 'if [ "$ACTION" != "destroy" ]; then echo "[STEP 1] Downloading project-specific sources zip from S3..."; fi'
      - 'if [ "$ACTION" != "destroy" ] && [ -z "$DEPLOYMENT_BUCKET" ]; then echo "ERROR: DEPLOYMENT_BUCKET environment variable is not set!" && exit 1; fi'
      - 'if [ "$ACTION" != "destroy" ]; then echo "Using deployment bucket: $DEPLOYMENT_BUCKET"; fi'
      - 'if [ "$ACTION" != "destroy" ]; then aws s3 cp s3://${DEPLOYMENT_BUCKET}/buildspec-source.zip ./project-sources.zip --quiet; fi'
      - 'if [ "$ACTION" != "destroy" ]; then echo "[STEP 2] Extracting project-specific source files..."; fi'
      - 'if [ "$ACTION" != "destroy" ]; then mkdir -p /tmp/project-sources && unzip -q project-sources.zip -d /tmp/project-sources/; fi'
      - 'if [ "$ACTION" != "destroy" ]; then echo "[STEP 3] Verifying extracted contents..."; fi'
      - 'if [ "$ACTION" != "destroy" ]; then echo "Contents of /tmp/project-sources/lambda/:"; fi'
      - 'if [ "$ACTION" != "destroy" ]; then ls -la /tmp/project-sources/lambda/ || echo "No lambda directory"; fi'
      - 'if [ "$ACTION" != "destroy" ]; then echo "Contents of /tmp/project-sources/lambda/project-specific/:"; fi'
      - 'if [ "$ACTION" != "destroy" ]; then ls -la /tmp/project-sources/lambda/project-specific/ | head -20 || echo "No project-specific directory"; fi'
      
      # SECOND STEP: Create infrastructure directory structure and copy files BEFORE any CDK operations
      - mkdir -p infrastructure/lib
      - mkdir -p infrastructure/bin
      - 'if [ "$ACTION" != "destroy" ]; then echo "[STEP 4] Creating infrastructure directories..."; fi'
      - 'if [ "$ACTION" != "destroy" ]; then mkdir -p infrastructure/lambda/layers infrastructure/lambda/project-specific infrastructure/stepfunctions/project-specific infrastructure/scripts infrastructure/athena-tables; fi'
      - 'if [ "$ACTION" != "destroy" ]; then echo "[STEP 5] Copying Lambda layers..."; fi'
      - 'if [ "$ACTION" != "destroy" ]; then cp -r /tmp/project-sources/lambda/layers/* infrastructure/lambda/layers/ 2>&1 || echo "Warning: Failed to copy layers"; fi'
      - 'if [ "$ACTION" != "destroy" ]; then echo "[STEP 6] Copying project-specific Lambda functions..."; fi'
      - 'if [ "$ACTION" != "destroy" ]; then cp -r /tmp/project-sources/lambda/project-specific/* infrastructure/lambda/project-specific/ 2>&1 || echo "Warning: Failed to copy Lambda functions"; fi'
      - 'if [ "$ACTION" != "destroy" ]; then echo "[STEP 7] Copying Step Function definitions..."; fi'
      - 'if [ "$ACTION" != "destroy" ]; then cp -r /tmp/project-sources/stepfunctions/project-specific/* infrastructure/stepfunctions/project-specific/ 2>&1 || echo "Warning: Failed to copy Step Functions"; fi'
      - 'if [ "$ACTION" != "destroy" ]; then echo "[STEP 7a] Copying scripts..."; fi'
      - 'if [ "$ACTION" != "destroy" ]; then cp -r /tmp/project-sources/scripts/* infrastructure/scripts/ 2>&1 || echo "Warning: Failed to copy scripts"; fi'
      - 'if [ "$ACTION" != "destroy" ]; then echo "[STEP 7b] Copying Athena table definitions..."; fi'
      - 'if [ "$ACTION" != "destroy" ]; then cp -r /tmp/project-sources/athena-tables/* infrastructure/athena-tables/ 2>&1 || echo "Warning: Failed to copy athena-tables"; fi'
      - 'if [ "$ACTION" != "destroy" ]; then echo "[STEP 8] Verifying copied files..."; fi'
      - 'if [ "$ACTION" != "destroy" ]; then echo "Lambda functions in infrastructure/lambda/project-specific/:"; fi'
      - 'if [ "$ACTION" != "destroy" ]; then ls -la infrastructure/lambda/project-specific/ | head -20 || echo "No Lambda functions found"; fi'
      - 'if [ "$ACTION" != "destroy" ]; then echo "Step Function definitions in infrastructure/stepfunctions/project-specific/:"; fi'
      - 'if [ "$ACTION" != "destroy" ]; then ls -la infrastructure/stepfunctions/project-specific/ || echo "No Step Function definitions found"; fi'
      - 'if [ "$ACTION" != "destroy" ]; then echo "Scripts in infrastructure/scripts/:"; fi'
      - 'if [ "$ACTION" != "destroy" ]; then ls -la infrastructure/scripts/ || echo "No scripts found"; fi'
      - 'if [ "$ACTION" != "destroy" ]; then echo "Athena table definitions in infrastructure/athena-tables/:"; fi'
      - 'if [ "$ACTION" != "destroy" ]; then ls -la infrastructure/athena-tables/ || echo "No athena-tables found"; fi'
      - 'if [ "$ACTION" = "destroy" ]; then echo "Skipping Lambda source download for destroy action"; fi'
      
      # Install CDK globally - use version that supports Node 22 and Python 3.12
      - echo "[STEP 9] Installing AWS CDK..."
      - npm install -g aws-cdk@2.170.0
      - echo "CDK version:" && cdk --version
      
      # Change to infrastructure directory
      - cd infrastructure
      
      # Verify files are still there after cd
      - 'if [ "$ACTION" != "destroy" ]; then echo "[STEP 10] Verifying files after cd infrastructure..."; fi'
      - 'if [ "$ACTION" != "destroy" ]; then echo "Current directory: $(pwd)"; fi'
      - 'if [ "$ACTION" != "destroy" ]; then echo "Lambda functions in ./lambda/project-specific/:"; fi'
      - 'if [ "$ACTION" != "destroy" ]; then ls -la ./lambda/project-specific/ | head -20 || echo "ERROR: No Lambda functions found!"; fi'
      - 'if [ "$ACTION" != "destroy" ]; then echo "Checking for component-similarity-athena-s3-wrapper:"; fi'
      - 'if [ "$ACTION" != "destroy" ]; then ls -la ./lambda/project-specific/component-similarity-athena-s3-wrapper/ 2>&1 || echo "ERROR: component-similarity-athena-s3-wrapper not found!"; fi'
      
      # Create basic CDK app structure for project-specific deployment
      - npm init -y
      - npm install aws-cdk-lib@2.170.0 constructs@10.0.0 typescript@~5.0.0 ts-node@^10.0.0 @types/node@22.0.0
      
      # Create proper package.json with TypeScript support
      - |
        cat > package.json << 'EOFPACKAGE'
        {
          "name": "app-modex-project-infrastructure",
          "version": "1.0.0",
          "bin": {
            "app": "bin/app.js"
          },
          "scripts": {
            "build": "tsc",
            "watch": "tsc -w",
            "test": "jest",
            "cdk": "cdk"
          },
          "devDependencies": {
            "@types/jest": "^29.4.0",
            "@types/node": "^22.0.0",
            "jest": "^29.5.0",
            "ts-jest": "^29.0.5",
            "aws-cdk": "2.170.0",
            "typescript": "~5.0.0",
            "ts-node": "^10.0.0"
          },
          "dependencies": {
            "aws-cdk-lib": "2.170.0",
            "constructs": "^10.0.0"
          }
        }
        EOFPACKAGE
      
      # Create tsconfig.json
      - |
        cat > tsconfig.json << 'EOFTSCONFIG'
        {
          "compilerOptions": {
            "target": "ES2022",
            "module": "commonjs",
            "lib": [
              "es2022"
            ],
            "declaration": true,
            "strict": true,
            "noImplicitAny": true,
            "strictNullChecks": true,
            "noImplicitThis": true,
            "alwaysStrict": true,
            "noUnusedLocals": false,
            "noUnusedParameters": false,
            "noImplicitReturns": true,
            "noFallthroughCasesInSwitch": false,
            "inlineSourceMap": true,
            "inlineSources": true,
            "experimentalDecorators": true,
            "strictPropertyInitialization": false,
            "typeRoots": [
              "./node_modules/@types"
            ]
          },
          "exclude": [
            "node_modules",
            "cdk.out"
          ]
        }
        EOFTSCONFIG
      
      # NOTE: Individual projects no longer need their own data processing Lambda
      # The master backend stack now handles data processing via SQS queues
      # This buildspec now only creates project-specific resources:
      # - S3 buckets for data storage
      # - DynamoDB table for data sources metadata
      # - Glue database and tables for Athena queries
      # - IAM roles for project access
      
      # Create the project-specific CDK stack (SQS-compliant)
      - |
        cat > lib/project-stack.ts << 'EOFSTACK'
        import * as cdk from 'aws-cdk-lib';
        import { Construct } from 'constructs';
        import * as s3 from 'aws-cdk-lib/aws-s3';
        import * as iam from 'aws-cdk-lib/aws-iam';
        import * as dynamodb from 'aws-cdk-lib/aws-dynamodb';
        import * as glue from 'aws-cdk-lib/aws-glue';
        import * as sqs from 'aws-cdk-lib/aws-sqs';
        import * as lambda from 'aws-cdk-lib/aws-lambda';
        import * as sns from 'aws-cdk-lib/aws-sns';
        import * as stepfunctions from 'aws-cdk-lib/aws-stepfunctions';
        import * as stepfunctionsTasks from 'aws-cdk-lib/aws-stepfunctions-tasks';
        import * as logs from 'aws-cdk-lib/aws-logs';

        import { SqsEventSource } from 'aws-cdk-lib/aws-lambda-event-sources';
        import { Duration } from 'aws-cdk-lib';
        import * as fs from 'fs';
        import * as path from 'path';
        
        export interface ProjectStackProps extends cdk.StackProps {
          projectId: string;
          environment: string;
          identityPoolId: string;
        }
        
        export class ProjectStack extends cdk.Stack {
          constructor(scope: Construct, id: string, props: ProjectStackProps) {
            super(scope, id, props);
            
            // Import access logs bucket from backend stack (Remediation #25)
            const accessLogsBucket = s3.Bucket.fromBucketName(
              this,
              'AccessLogsBucket',
              cdk.Fn.importValue('AppModEx-AccessLogsBucketName')
            );
            
            // Create S3 bucket for project assets
            const projectBucket = new s3.Bucket(this, 'ProjectBucket', {
              bucketName: `app-modex-data-${props.projectId}`.toLowerCase(),
              removalPolicy: cdk.RemovalPolicy.DESTROY,
              autoDeleteObjects: true,
              versioned: true,
              encryption: s3.BucketEncryption.S3_MANAGED,
              blockPublicAccess: s3.BlockPublicAccess.BLOCK_ALL,
              serverAccessLogsBucket: accessLogsBucket,
              serverAccessLogsPrefix: `project-${props.projectId}/data-bucket/`,
              cors: [
                {
                  allowedMethods: [
                    s3.HttpMethods.GET,
                    s3.HttpMethods.PUT,
                    s3.HttpMethods.POST,
                    s3.HttpMethods.DELETE,
                    s3.HttpMethods.HEAD,
                  ],
                  allowedOrigins: ['http://localhost:3000', 'https://*.amazonaws.com', 'https://*.cloudfront.net'],
                  allowedHeaders: ['*'],
                  exposedHeaders: ['ETag'],
                  maxAge: 3000
                }
              ]
            });

            // SECURITY NOTE: Enforce encryption in transit (Remediation #7)
            // Deny all requests that don't use HTTPS/TLS
            projectBucket.addToResourcePolicy(new iam.PolicyStatement({
              sid: 'DenyInsecureTransport',
              effect: iam.Effect.DENY,
              principals: [new iam.AnyPrincipal()],
              actions: ['s3:*'],
              resources: [
                projectBucket.bucketArn,
                `${projectBucket.bucketArn}/*`
              ],
              conditions: {
                Bool: {
                  'aws:SecureTransport': 'false'
                }
              }
            }));
            
            // Create an S3 bucket for Athena query results
            const resultsBucket = new s3.Bucket(this, 'ResultsBucket', {
              bucketName: `app-modex-results-${props.projectId}`.toLowerCase(),
              removalPolicy: cdk.RemovalPolicy.DESTROY,
              autoDeleteObjects: true,
              versioned: false,
              encryption: s3.BucketEncryption.S3_MANAGED,
              blockPublicAccess: s3.BlockPublicAccess.BLOCK_ALL,
              serverAccessLogsBucket: accessLogsBucket,
              serverAccessLogsPrefix: `project-${props.projectId}/results-bucket/`,
              lifecycleRules: [
                {
                  id: 'DeleteOldResults',
                  enabled: true,
                  expiration: cdk.Duration.days(7), // Delete query results after 7 days
                },
              ],
            });

            // SECURITY NOTE: Enforce encryption in transit (Remediation #7)
            // Deny all requests that don't use HTTPS/TLS
            resultsBucket.addToResourcePolicy(new iam.PolicyStatement({
              sid: 'DenyInsecureTransport',
              effect: iam.Effect.DENY,
              principals: [new iam.AnyPrincipal()],
              actions: ['s3:*'],
              resources: [
                resultsBucket.bucketArn,
                `${resultsBucket.bucketArn}/*`
              ],
              conditions: {
                Bool: {
                  'aws:SecureTransport': 'false'
                }
              }
            }));
            
            // Create Athena WorkGroup for query execution
            const athenaWorkGroup = new cdk.CfnResource(this, 'AthenaWorkGroup', {
              type: 'AWS::Athena::WorkGroup',
              properties: {
                Name: `app-modex-workgroup-${props.projectId}`.toLowerCase(),
                Description: `Athena WorkGroup for App-ModEx project ${props.projectId}`,
                State: 'ENABLED',
                RecursiveDeleteOption: true,
                WorkGroupConfiguration: {
                  ResultConfiguration: {
                    OutputLocation: `s3://${resultsBucket.bucketName}/athena-results/`,
                    EncryptionConfiguration: {
                      EncryptionOption: 'SSE_S3'
                    }
                  },
                  EnforceWorkGroupConfiguration: true,
                  BytesScannedCutoffPerQuery: 1000000000, // 1GB limit
                  RequesterPaysEnabled: false
                }
              }
            });
            
            // ===== PROJECT-SPECIFIC SQS QUEUES =====
            
            // NOTE: Project operations (create/delete) are handled by global queue in master backend
            // Only data processing queues are project-specific for complete data isolation
            
            // Dead Letter Queue for data processing
            const dataProcessingDLQ = new sqs.Queue(this, 'DataProcessingDLQ', {
              queueName: `app-modex-data-${props.projectId}-dlq`.toLowerCase(),
              retentionPeriod: Duration.days(14),
              encryption: sqs.QueueEncryption.SQS_MANAGED,
            });

            // Main queue for data processing (file uploads)
            const dataProcessingQueue = new sqs.Queue(this, 'DataProcessingQueue', {
              queueName: `app-modex-data-${props.projectId}`.toLowerCase(),
              visibilityTimeout: Duration.minutes(10), // Should be >= Lambda timeout
              retentionPeriod: Duration.days(14),
              encryption: sqs.QueueEncryption.SQS_MANAGED,
              deadLetterQueue: {
                queue: dataProcessingDLQ,
                maxReceiveCount: 3,
              },
            });
            
            // Create a DynamoDB table for data sources (NO STREAMS - SQS handles processing)
            const dataSourcesTable = new dynamodb.Table(this, 'DataSourcesTable', {
              tableName: `app-modex-data-sources-${props.projectId}`.toLowerCase(),
              partitionKey: { name: 'projectId', type: dynamodb.AttributeType.STRING },
              sortKey: { name: 'id', type: dynamodb.AttributeType.STRING },
              billingMode: dynamodb.BillingMode.PAY_PER_REQUEST,
              removalPolicy: cdk.RemovalPolicy.DESTROY,
              // REMOVED: stream: dynamodb.StreamViewType.NEW_AND_OLD_IMAGES,
              // Data processing is now handled by SQS queues in the master backend
              pointInTimeRecovery: true,
            });

            // Add GSI for data source type queries
            dataSourcesTable.addGlobalSecondaryIndex({
              indexName: 'dataSourceType-index',
              partitionKey: { name: 'dataSourceType', type: dynamodb.AttributeType.STRING },
              sortKey: { name: 'timestamp', type: dynamodb.AttributeType.STRING },
              projectionType: dynamodb.ProjectionType.ALL,
            });
            
            // Create a DynamoDB table for process tracking
            // NOTE: processId is unique (timestamp + random), so no sort key needed
            const processTrackingTable = new dynamodb.Table(this, 'ProcessTrackingTable', {
              tableName: `app-modex-process-${props.projectId}`.toLowerCase(),
              partitionKey: { name: 'processId', type: dynamodb.AttributeType.STRING },
              // REMOVED sortKey to prevent duplicate records - processId is already unique
              billingMode: dynamodb.BillingMode.PAY_PER_REQUEST,
              removalPolicy: cdk.RemovalPolicy.DESTROY,
              pointInTimeRecovery: true,
            });

            // Add GSI for process type queries (use startTime for sorting)
            processTrackingTable.addGlobalSecondaryIndex({
              indexName: 'processType-index',
              partitionKey: { name: 'processType', type: dynamodb.AttributeType.STRING },
              sortKey: { name: 'startTime', type: dynamodb.AttributeType.STRING },
              projectionType: dynamodb.ProjectionType.ALL,
            });

            // Add GSI for status queries (use startTime for sorting)
            processTrackingTable.addGlobalSecondaryIndex({
              indexName: 'status-index',
              partitionKey: { name: 'status', type: dynamodb.AttributeType.STRING },
              sortKey: { name: 'startTime', type: dynamodb.AttributeType.STRING },
              projectionType: dynamodb.ProjectionType.ALL,
            });
            
            // Create IAM roles for project access
            const projectReadRole = new iam.Role(this, 'ProjectReadRole', {
              roleName: `app-modex-proj-${props.projectId}-read`,
              permissionsBoundary: iam.ManagedPolicy.fromManagedPolicyArn(
                this,
                'ReadRoleBoundary',
                cdk.Fn.importValue('AppModEx-CDKPermissionsBoundaryArn')
              ),
              assumedBy: new iam.FederatedPrincipal(
                'cognito-identity.amazonaws.com',
                {
                  StringEquals: {
                    'cognito-identity.amazonaws.com:aud': props.identityPoolId
                  },
                  'ForAnyValue:StringLike': {
                    'cognito-identity.amazonaws.com:amr': 'authenticated'
                  }
                },
                'sts:AssumeRoleWithWebIdentity'
              ),
              description: `Read-only access to App-ModEx project ${props.projectId}`
            });
            
            const projectWriteRole = new iam.Role(this, 'ProjectWriteRole', {
              roleName: `app-modex-proj-${props.projectId}-write`,
              permissionsBoundary: iam.ManagedPolicy.fromManagedPolicyArn(
                this,
                'WriteRoleBoundary',
                cdk.Fn.importValue('AppModEx-CDKPermissionsBoundaryArn')
              ),
              assumedBy: new iam.FederatedPrincipal(
                'cognito-identity.amazonaws.com',
                {
                  StringEquals: {
                    'cognito-identity.amazonaws.com:aud': props.identityPoolId
                  },
                  'ForAnyValue:StringLike': {
                    'cognito-identity.amazonaws.com:amr': 'authenticated'
                  }
                },
                'sts:AssumeRoleWithWebIdentity'
              ),
              description: `Read/write access to App-ModEx project ${props.projectId}`
            });
            
            // Grant permissions
            projectBucket.grantRead(projectReadRole);
            projectBucket.grantReadWrite(projectWriteRole);
            resultsBucket.grantRead(projectReadRole);
            resultsBucket.grantRead(projectWriteRole);
            
            // Grant Athena service permissions to write query results to results bucket
            // CONFUSED DEPUTY PREVENTION: SourceAccount condition prevents cross-account attacks
            resultsBucket.addToResourcePolicy(new iam.PolicyStatement({
              effect: iam.Effect.ALLOW,
              principals: [new iam.ServicePrincipal('athena.amazonaws.com')],
              actions: [
                's3:GetBucketLocation',
                's3:GetObject',
                's3:ListBucket',
                's3:ListBucketMultipartUploads',
                's3:ListMultipartUploadParts',
                's3:AbortMultipartUpload',
                's3:PutObject'
              ],
              resources: [
                resultsBucket.bucketArn,
                `${resultsBucket.bucketArn}/*`
              ],
              conditions: {
                StringEquals: {
                  'aws:SourceAccount': cdk.Aws.ACCOUNT_ID
                }
              }
            }));
            
            // Grant permissions for DynamoDB
            dataSourcesTable.grantReadData(projectReadRole);
            dataSourcesTable.grantReadWriteData(projectWriteRole);
            
            // Grant Athena permissions to project write role (for lambda execution)
            projectWriteRole.addToPolicy(new iam.PolicyStatement({
              effect: iam.Effect.ALLOW,
              actions: [
                'athena:StartQueryExecution',
                'athena:GetQueryExecution',
                'athena:GetQueryResults',
                'athena:StopQueryExecution',
                'athena:GetWorkGroup'
              ],
              resources: ['*']
            }));
            
            // Create Glue Database for Athena
            const glueDatabase = new glue.CfnDatabase(this, 'GlueDatabase', {
              catalogId: cdk.Aws.ACCOUNT_ID,
              databaseInput: {
                name: `app_modex_${props.projectId}`.toLowerCase(),
                description: `Glue database for App-ModEx project ${props.projectId}`,
              }
            });

            // Helper function to create Athena tables
            const createAthenaTable = (tableName: string, description: string, columns: any[], dataPath: string) => {
              const table = new glue.CfnTable(this, `${tableName}Table`, {
                catalogId: cdk.Aws.ACCOUNT_ID,
                databaseName: glueDatabase.ref,
                tableInput: {
                  name: tableName.toLowerCase(),
                  description: description,
                  tableType: 'EXTERNAL_TABLE',
                  parameters: {
                    'classification': 'csv',
                    'typeOfData': 'file',
                    'skip.header.line.count': '1'
                  },
                  storageDescriptor: {
                    columns: columns,
                    location: `s3://${projectBucket.bucketName}/data-processed/${dataPath}/`,
                    inputFormat: 'org.apache.hadoop.mapred.TextInputFormat',
                    outputFormat: 'org.apache.hadoop.hive.ql.io.HiveIgnoreKeyTextOutputFormat',
                    serdeInfo: {
                      serializationLibrary: 'org.apache.hadoop.hive.serde2.OpenCSVSerde',
                      parameters: {
                        'separatorChar': ',',
                        'quoteChar': '"',
                        'escapeChar': '\\'
                      }
                    }
                  }
                }
              });
              
              // Ensure table is created after database
              table.addDependency(glueDatabase);
              return table;
            };

            // Grant Glue permissions to project write role (for Athena to access tables)
            projectWriteRole.addToPolicy(new iam.PolicyStatement({
              effect: iam.Effect.ALLOW,
              actions: [
                'glue:GetDatabase',
                'glue:GetTable',
                'glue:GetTables',
                'glue:GetPartition',
                'glue:GetPartitions'
              ],
              resources: [
                `arn:aws:glue:${cdk.Aws.REGION}:${cdk.Aws.ACCOUNT_ID}:catalog`,
                `arn:aws:glue:${cdk.Aws.REGION}:${cdk.Aws.ACCOUNT_ID}:database/${glueDatabase.ref}`,
                `arn:aws:glue:${cdk.Aws.REGION}:${cdk.Aws.ACCOUNT_ID}:table/${glueDatabase.ref}/*`
              ]
            }));

            // Create all Athena tables for App-ModEx data sections
            
            // 1. Team Skills Table
            const teamSkillsTable = createAthenaTable(
              'team_skills',
              'Team skills inventory data',
              [
                { name: 'id', type: 'string', comment: 'Unique identifier' },
                { name: 'skill', type: 'string', comment: 'Skill name' },
                { name: 'category', type: 'string', comment: 'Skill category' },
                { name: 'proficiency', type: 'int', comment: 'Proficiency level (1-5)' },
                { name: 'team', type: 'string', comment: 'Team name' },
                { name: 'members', type: 'int', comment: 'Number of team members' },
                { name: 'notes', type: 'string', comment: 'Additional notes' },

                { name: 'processed_at', type: 'string', comment: 'Processed Date/Time' },
                { name: 'project_id', type: 'string', comment: 'Project Id' },
                { name: 'data_source_id', type: 'string', comment: 'Data Source Id' },
                { name: 'transformation_type', type: 'string', comment: 'Transformation Type' },
                { name: 'original_format', type: 'string', comment: 'Original File Format' }

              ],
              'team-skills'
            );

            // 2. Technology Vision Table
            const techVisionTable = createAthenaTable(
              'tech_vision',
              'Technology vision and radar data',
              [
                { name: 'id', type: 'string', comment: 'Unique identifier' },
                { name: 'technology', type: 'string', comment: 'Technology name' },
                { name: 'quadrant', type: 'string', comment: 'Technology quadrant' },
                { name: 'phase', type: 'string', comment: 'Adoption phase (Adopt, Trial, Assess, Hold)' },

                { name: 'processed_at', type: 'string', comment: 'Processed Date/Time' },
                { name: 'project_id', type: 'string', comment: 'Project Id' },
                { name: 'data_source_id', type: 'string', comment: 'Data Source Id' },
                { name: 'transformation_type', type: 'string', comment: 'Transformation Type' },
                { name: 'original_format', type: 'string', comment: 'Original File Format' }

              ],
              'technology-vision'
            );

            // 3. Application Portfolio Table
            const applicationPortfolioTable = createAthenaTable(
              'application_portfolio',
              'Application portfolio and assessment data',
              [
                { name: 'id', type: 'string', comment: 'Unique identifier' },
                { name: 'applicationname', type: 'string', comment: 'Application name' },
                { name: 'department', type: 'string', comment: 'Department' },
                { name: 'criticality', type: 'string', comment: 'Business criticality' },
                { name: 'purpose', type: 'string', comment: 'Application purpose' },

                { name: 'processed_at', type: 'string', comment: 'Processed Date/Time' },
                { name: 'project_id', type: 'string', comment: 'Project Id' },
                { name: 'data_source_id', type: 'string', comment: 'Data Source Id' },
                { name: 'transformation_type', type: 'string', comment: 'Transformation Type' },
