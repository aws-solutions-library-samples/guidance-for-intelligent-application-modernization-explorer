<!DOCTYPE html>
<html>
<head>
  <title>Simple Weight Form</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }
    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 16px;
    }
    .form-group {
      margin-bottom: 16px;
    }
    label {
      display: block;
      font-weight: bold;
      margin-bottom: 4px;
    }
    .description {
      font-size: 12px;
      color: #666;
      margin-bottom: 4px;
    }
    input {
      width: 100%;
      padding: 8px 12px;
      font-size: 14px;
      border: 2px solid #adb5bd;
      border-radius: 4px;
      box-sizing: border-box;
    }
    .button-group {
      display: flex;
      justify-content: flex-end;
      margin-top: 20px;
      gap: 10px;
    }
    .cancel-button {
      padding: 8px 16px;
      background-color: transparent;
      border: none;
      cursor: pointer;
      color: #0073bb;
    }
    .update-button {
      padding: 8px 16px;
      background-color: #0073bb;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h2>Edit Skill Category Weights - API Team</h2>
  
  <div style="margin-bottom: 20px;">
    <div style="display: flex; gap: 20px; margin-bottom: 10px;">
      <div><strong>Total Allocated:</strong> <span id="totalAllocated">0</span>%</div>
      <div><strong>Remaining:</strong> <span id="remaining">100</span>%</div>
    </div>
    <div style="height: 10px; background-color: #e9ecef; border-radius: 5px; overflow: hidden;">
      <div id="progressBar" style="height: 100%; width: 0%; background-color: #0073bb; border-radius: 5px;"></div>
    </div>
  </div>
  
  <form id="weightForm">
    <div class="form-grid">
      <div class="form-group">
        <label for="api">API</label>
        <div class="description">Weight for API skills</div>
        <input type="text" id="api" name="api" value="12" placeholder="0">
      </div>
      <div class="form-group">
        <label for="backend">Backend</label>
        <div class="description">Weight for Backend skills</div>
        <input type="text" id="backend" name="backend" value="13" placeholder="0">
      </div>
      <div class="form-group">
        <label for="cloud">Cloud</label>
        <div class="description">Weight for Cloud skills</div>
        <input type="text" id="cloud" name="cloud" value="14" placeholder="0">
      </div>
      <div class="form-group">
        <label for="database">Database</label>
        <div class="description">Weight for Database skills</div>
        <input type="text" id="database" name="database" value="15" placeholder="0">
      </div>
      <div class="form-group">
        <label for="devops">DevOps</label>
        <div class="description">Weight for DevOps skills</div>
        <input type="text" id="devops" name="devops" value="16" placeholder="0">
      </div>
      <div class="form-group">
        <label for="frontend">Frontend</label>
        <div class="description">Weight for Frontend skills</div>
        <input type="text" id="frontend" name="frontend" value="17" placeholder="0">
      </div>
      <div class="form-group">
        <label for="testing">Testing</label>
        <div class="description">Weight for Testing skills</div>
        <input type="text" id="testing" name="testing" value="10" placeholder="0">
      </div>
    </div>
    
    <div class="button-group">
      <button type="button" class="cancel-button">Cancel</button>
      <button type="submit" class="update-button">Update Weights</button>
    </div>
  </form>

  <script>
    // Calculate total weight and update UI
    function updateTotal() {
      const inputs = document.querySelectorAll('input[type="text"]');
      let total = 0;
      
      inputs.forEach(input => {
        const value = parseFloat(input.value) || 0;
        total += value;
      });
      
      document.getElementById('totalAllocated').textContent = total.toFixed(1);
      document.getElementById('remaining').textContent = (100 - total).toFixed(1);
      document.getElementById('progressBar').style.width = Math.min(total, 100) + '%';
      
      if (total > 100) {
        document.getElementById('progressBar').style.backgroundColor = '#d13212';
      } else {
        document.getElementById('progressBar').style.backgroundColor = '#0073bb';
      }
    }
    
    // Add event listeners to all inputs
    document.querySelectorAll('input[type="text"]').forEach(input => {
      input.addEventListener('input', updateTotal);
    });
    
    // Initialize total
    updateTotal();
    
    // Handle form submission
    document.getElementById('weightForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const formData = new FormData(this);
      const weights = {};
      
      for (const [key, value] of formData.entries()) {
        weights[key] = parseFloat(value) || 0;
      }
      
      console.log('Submitted weights:', weights);
      alert('Weights updated successfully!');
    });
    
    // Handle cancel button
    document.querySelector('.cancel-button').addEventListener('click', function() {
      console.log('Cancelled');
      alert('Cancelled');
    });
  </script>
</body>
</html>
